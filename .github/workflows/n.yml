name: V2Ray Matrix Bot

on:
  schedule:
    # هر روز در ساعت‌های 00:00, 06:00, 12:00, 18:00 UTC اجرا می‌شود
    - cron: '0 */6 * * *'
  workflow_dispatch:  # اجازه اجرای دستی

jobs:
  run-matrix-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355  # پایان نرم قبل از رسیدن به محدودیت ۶ ساعته مایکروسافت

    # جلوگیری از هم‌پوشانی: اگر اجرای قبلی در حال اتمام بود، اجرای جدید منتظر می‌ماند
    concurrency:
      group: v2ray-matrix-runner
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download and Prepare Xray-core
        run: |
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip Xray-linux-64.zip -d xray
          chmod +x xray/xray

      - name: Run Matrix Bot Server
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python bot.py
